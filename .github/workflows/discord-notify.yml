name: Discord Notifications

on:
  workflow_run:
    workflows:
      - Tests
      - Lint & Coding Standards
      - Security
      - Integration Tests
      - Release
    types: [completed]

permissions:
  contents: read

jobs:
  notify-failure:
    if: github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Notify Discord of failure
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
          REPOSITORY: ${{ github.repository }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          WORKFLOW_URL: ${{ github.event.workflow_run.html_url }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "No DISCORD_WEBHOOK secret configured, skipping"
            exit 0
          fi
          curl -s -H "Content-Type: application/json" -d "{
            \"embeds\": [{
              \"title\": \"❌ Workflow Failed: $WORKFLOW_NAME\",
              \"description\": \"**Repository:** $REPOSITORY\n**Branch:** $HEAD_BRANCH\n**Commit:** \`$HEAD_SHA\`\",
              \"url\": \"$WORKFLOW_URL\",
              \"color\": 15158332,
              \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
            }]
          }" "$DISCORD_WEBHOOK"

  notify-release:
    if: github.event.workflow_run.name == 'Release' && github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Notify Discord of release
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          REPOSITORY: ${{ github.repository }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "No DISCORD_WEBHOOK secret configured, skipping"
            exit 0
          fi
          curl -s -H "Content-Type: application/json" -d "{
            \"embeds\": [{
              \"title\": \"✅ New Release Published\",
              \"description\": \"**Repository:** $REPOSITORY\n**Branch:** $HEAD_BRANCH\",
              \"url\": \"https://github.com/$REPOSITORY/releases/latest\",
              \"color\": 3066993,
              \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
            }]
          }" "$DISCORD_WEBHOOK"
