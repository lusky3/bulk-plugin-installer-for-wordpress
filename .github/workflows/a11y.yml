name: Accessibility

on:
  push:
    branches: [main]
    paths: ['assets/**', 'includes/class-bpi-admin-page.php', 'includes/class-bpi-settings-manager.php']
  pull_request:
    branches: [main]
    paths: ['assets/**', 'includes/class-bpi-admin-page.php', 'includes/class-bpi-settings-manager.php']

permissions:
  contents: read

jobs:
  axe:
    name: axe-core Accessibility Audit
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mysqli, zip, mbstring
          tools: wp-cli
          coverage: none

      - name: Install WordPress
        run: |
          wp core download --path=/tmp/wordpress
          wp config create --path=/tmp/wordpress \
            --dbname=wordpress --dbuser=root --dbpass=root --dbhost=127.0.0.1
          wp core install --path=/tmp/wordpress \
            --url=http://localhost:8080 --title=Test \
            --admin_user=admin --admin_password=admin --admin_email=admin@example.com

      - name: Install plugin
        run: |
          cp -r "$GITHUB_WORKSPACE" /tmp/wordpress/wp-content/plugins/bulk-plugin-installer
          wp plugin activate bulk-plugin-installer --path=/tmp/wordpress

      - name: Start PHP built-in server
        run: |
          php -S localhost:8080 -t /tmp/wordpress &
          sleep 2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Playwright and axe
        run: |
          npm install --no-save playwright @axe-core/playwright
          npx playwright install chromium --with-deps

      - name: Run accessibility audit
        run: |
          node << 'EOF'
          const { chromium } = require('playwright');
          const { AxeBuilder } = require('@axe-core/playwright');

          (async () => {
            const browser = await chromium.launch();
            const context = await browser.newContext();
            const page = await context.newPage();

            // Login
            await page.goto('http://localhost:8080/wp-login.php');
            await page.fill('#user_login', 'admin');
            await page.fill('#user_pass', 'admin');
            await page.click('#wp-submit');
            await page.waitForURL('**/wp-admin/**');

            const results = [];

            // Audit Bulk Upload page
            await page.goto('http://localhost:8080/wp-admin/plugins.php?page=bpi-bulk-upload');
            await page.waitForSelector('#bpi-bulk-upload-app');
            const uploadResults = await new AxeBuilder({ page })
              .include('#bpi-bulk-upload-wrap')
              .withTags(['wcag2a', 'wcag2aa', 'best-practice'])
              .analyze();
            results.push({ page: 'Bulk Upload', violations: uploadResults.violations });

            // Audit Settings page
            await page.goto('http://localhost:8080/wp-admin/options-general.php?page=bpi-settings');
            await page.waitForSelector('.wrap');
            const settingsResults = await new AxeBuilder({ page })
              .include('.wrap')
              .withTags(['wcag2a', 'wcag2aa', 'best-practice'])
              .analyze();
            results.push({ page: 'Settings', violations: settingsResults.violations });

            await browser.close();

            // Report
            let hasViolations = false;
            for (const r of results) {
              if (r.violations.length > 0) {
                hasViolations = true;
                console.log(`\n❌ ${r.page} page: ${r.violations.length} violation(s)`);
                for (const v of r.violations) {
                  console.log(`  [${v.impact}] ${v.id}: ${v.description}`);
                  for (const node of v.nodes.slice(0, 3)) {
                    console.log(`    - ${node.html.substring(0, 120)}`);
                  }
                }
              } else {
                console.log(`✅ ${r.page} page: No violations`);
              }
            }

            if (hasViolations) process.exit(1);
          })();
          EOF
